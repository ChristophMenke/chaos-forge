name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, Type-Check & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies (fresh resolve for linux bindings)
        run: rm package-lock.json && npm install
      - run: npm run format:check
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

  # E2E tests disabled — run locally via `npm run test:e2e`
  # e2e:
  #   name: E2E Tests (Playwright)
  #   runs-on: ubuntu-latest
  #   needs: quality
  #   if: github.event_name == 'pull_request'
